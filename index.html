<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Romantic Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --night-bg: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            --day-bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #ff69b4;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background: var(--night-bg); transition: background 2s ease;
        }

        body.day { background: var(--day-bg); }

        #canvas-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        #play-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; cursor: pointer; background: transparent;
        }

        .scene {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .tree-wrapper {
            position: relative; cursor: pointer; transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tree-icon {
            font-size: clamp(100px, 20vw, 180px);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            animation: softSway 8s ease-in-out infinite alternate;
        }

        @keyframes softSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        .controls {
            position: absolute; top: 30px; right: 30px; z-index: 100;
        }

        .glass-btn {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 12px 24px; border-radius: 50px; cursor: pointer;
            font-size: 13px; font-family: 'Poppins', sans-serif; transition: 0.3s;
        }

        .message-box {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            pointer-events: none; padding: 0 20px;
        }

        .romantic-msg {
            font-family: 'Great Vibes', cursive; font-size: clamp(2.5rem, 5vw, 4rem);
            color: white; opacity: 0; text-shadow: 0 0 20px rgba(255,105,180,0.8);
        }

        @keyframes floatText {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        .animate-msg { animation: floatText 6s forwards; }

        .petal {
            position: absolute; pointer-events: none; z-index: 5;
            top: -50px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Credit Section */
        .footer-credit {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 12px; text-decoration: none;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .footer-credit:hover {
            background: rgba(255,255,255,0.2); transform: translateY(-5px);
        }
    </style>
</head>
<body onload="init()">

<div id="play-trigger" onclick="startExperience()"></div>
<canvas id="canvas-stars"></canvas>

<div class="controls">
    <button class="glass-btn" onclick="toggleMode()">✨ Switch Scene</button>
</div>

<a href="#" class="footer-credit">
    <span>Made with ❤️ by</span>
    <strong style="color: var(--accent);">FAHIM</strong>
</a>

<div class="scene">
    <div class="tree-wrapper" onclick="handleInteraction()">
        <div class="tree-icon" id="main-tree">🌳</div>
    </div>
</div>

<div class="message-box" id="msg-container"></div>

<audio id="bg-audio" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('bg-audio');

    function init() {
        createStars();
    }

    function startExperience() {
        audio.play().catch(e => console.log("Audio play failed"));
        document.getElementById('play-trigger').style.display = 'none';
        handleInteraction();
    }

    function createStars() {
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const stars = [];
        for(let i=0; i<300; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.2,
                blinkSpeed: 0.02 + Math.random() * 0.05,
                phase: Math.random() * Math.PI * 2
            });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.phase += s.blinkSpeed;
                ctx.globalAlpha = (Math.sin(s.phase) + 1) / 2;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function toggleMode() { document.body.classList.toggle('day'); }

    function handleInteraction() {
        const tree = document.getElementById('main-tree');
        tree.style.filter = "drop-shadow(0 0 50px #ff69b4)";
        setTimeout(() => tree.style.filter = "drop-shadow(0 0 20px rgba(0,0,0,0.5))", 1000);
        
        for(let i=0; i<60; i++) {
            setTimeout(createPetal, i * 70);
        }
        showRomanticMessage();
    }

    function createPetal() {
        const p = document.createElement('div');
        p.className = 'petal';
        p.innerHTML = ['🌸', '💖', '✨', '🌹', '🌷', '🌺'][Math.floor(Math.random()*6)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = Math.random() * 25 + 20 + 'px';
        const duration = Math.random() * 5 + 7;
        p.style.animation = `fall ${duration}s linear forwards`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), duration * 1000);
    }

    function showRomanticMessage() {
        const container = document.getElementById('msg-container');
        const messages = [
            "তারার প্রতিটি পলকে, আমি তোমাকে ভালোবাসার কারণ খুঁজে পাই।",
            "রাতের নিস্তব্ধতায় আমাদের আত্মা মিলেমিশে একাকার হয়ে যায়।",
            "তুমি আমার বিশৃঙ্খল পৃথিবীর একমাত্র শান্তি।",
            "তোমার সাথে থাকলে প্রতিটি ঋতুই যেন বসন্তের মতো সুন্দর।",
            "তোমার আলোর কাছে আকাশের তারারাও ম্লান হয়ে যায়।",
            "তোমাকে গতকালও ভালোবাসতাম, আজও বাসি, আর চিরকাল বেসে যাবো।"
        ];
        container.innerHTML = "";
        const el = document.createElement('div');
        el.className = 'romantic-msg animate-msg';
        el.innerText = messages[Math.floor(Math.random()*messages.length)];
        container.appendChild(el);
    }

    window.addEventListener('resize', () => {
        const canvas = document.getElementById('canvas-stars');
        if(canvas) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
    });
</script>

</body>
</html>
