<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Romantic Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --night-bg: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            --day-bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #ff69b4;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background: var(--night-bg); transition: background 2s ease;
            touch-action: manipulation; /* Mobile scroll/zoom fix */
        }

        body.day { background: var(--day-bg); }

        #canvas-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        #play-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; cursor: pointer; background: transparent;
        }

        .scene {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .tree-wrapper {
            position: relative; cursor: pointer; 
            transform-origin: bottom center;
            margin-top: 50px;
        }

        .tree-img {
            width: 70vw; /* Mobile responsive width */
            max-width: 450px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            animation: treeSway 10s ease-in-out infinite alternate;
            -webkit-user-drag: none;
        }

        @keyframes treeSway {
            0% { transform: rotate(-1.5deg); }
            100% { transform: rotate(1.5deg); }
        }

        .controls {
            position: absolute; top: 20px; right: 20px; z-index: 100;
        }

        .glass-btn {
            background: var(--glass); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-size: 12px; font-family: 'Poppins', sans-serif;
        }

        .message-box {
            position: absolute; bottom: 12%; width: 90%; text-align: center;
            pointer-events: none; left: 50%; transform: translateX(-50%);
        }

        .romantic-msg {
            font-family: 'Great Vibes', cursive; font-size: clamp(1.8rem, 8vw, 3.5rem);
            color: white; opacity: 0; text-shadow: 0 0 15px rgba(255,105,180,0.8);
            line-height: 1.3;
        }

        .animate-msg { animation: floatText 6s ease-in-out forwards; }

        @keyframes floatText {
            0% { opacity: 0; transform: translateY(15px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .petal {
            position: absolute; pointer-events: none; z-index: 15;
            top: -10%;
            will-change: transform; /* Performance boost */
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .footer-credit {
            position: absolute; bottom: 15px; left: 15px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 10px; text-decoration: none;
            display: flex; align-items: center; gap: 5px;
        }
    </style>
</head>
<body onload="init()">

<div id="play-trigger" onclick="startExperience()"></div>
<canvas id="canvas-stars"></canvas>

<div class="controls">
    <button class="glass-btn" onclick="toggleMode()">✨ Switch Scene</button>
</div>

<div class="footer-credit">
    <span>Made with ❤️ by</span>
    <strong style="color: var(--accent);">FAHIM</strong>
</div>

<div class="scene">
    <div class="tree-wrapper" onclick="handleInteraction()">
        <img src="tree.png" alt="Tree" class="tree-img" id="main-tree" onerror="this.src='https://cdn-icons-png.flaticon.com/512/489/489969.png'">
    </div>
</div>

<div class="message-box" id="msg-container"></div>

<audio id="bg-audio" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('bg-audio');
    let stars = [];
    const canvas = document.getElementById('canvas-stars');
    const ctx = canvas.getContext('2d');

    function init() {
        resizeCanvas();
        createStars();
        animate();
    }

    function startExperience() {
        audio.play().catch(e => console.log("Audio play blocked"));
        document.getElementById('play-trigger').style.display = 'none';
        handleInteraction();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createStars() {
        const count = window.innerWidth < 600 ? 150 : 300; // Less stars for mobile performance
        stars = [];
        for(let i=0; i<count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * (window.innerWidth < 600 ? 1.5 : 2.2),
                blinkSpeed: 0.02 + Math.random() * 0.04,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.phase += s.blinkSpeed;
            ctx.globalAlpha = (Math.sin(s.phase) + 1) / 2;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    function toggleMode() { document.body.classList.toggle('day'); }

    function handleInteraction() {
        const tree = document.getElementById('main-tree');
        tree.style.filter = "drop-shadow(0 0 20px #ff69b4) brightness(1.1)";
        setTimeout(() => tree.style.filter = "drop-shadow(0 0 10px rgba(0,0,0,0.5))", 800);
        
        const petalCount = window.innerWidth < 600 ? 35 : 60;
        for(let i=0; i<petalCount; i++) {
            setTimeout(createPetal, i * 80);
        }
        showRomanticMessage();
    }

    function createPetal() {
        const p = document.createElement('div');
        p.className = 'petal';
        p.innerHTML = ['🌸', '💖', '✨', '🌹', '🌺'][Math.floor(Math.random()*5)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = Math.random() * 15 + 15 + 'px';
        const duration = Math.random() * 4 + 5;
        p.style.animation = `fall ${duration}s linear forwards`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), duration * 1000);
    }

    function showRomanticMessage() {
        const container = document.getElementById('msg-container');
        const messages = [
            "তারার প্রতিটি পলকে, আমি তোমাকে ভালোবাসার কারণ খুঁজে পাই।",
            "রাতের নিস্তব্ধতায় আমাদের আত্মা মিলেমিশে একাকার হয়ে যায়।",
            "তুমি আমার বিশৃঙ্খল পৃথিবীর একমাত্র শান্তি।",
            "তোমার সাথে থাকলে প্রতিটি ঋতুই যেন বসন্তের মতো সুন্দর।",
            "তোমার আলোর কাছে আকাশের তারারাও ম্লান হয়ে যায়।",
            "তোমাকে গতকালও ভালোবাসতাম, আজও বাসি, আর চিরকাল বেসে যাবো।"
        ];
        container.innerHTML = "";
        const el = document.createElement('div');
        el.className = 'romantic-msg animate-msg';
        el.innerText = messages[Math.floor(Math.random()*messages.length)];
        container.appendChild(el);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        createStars();
    });
</script>

</body>
</html>
